<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Dunn</title>
    <link rel="stylesheet" href="style.css">
    <!-- load data first -->
    <script src="config/data.js"></script>
</head>
<body class="light-mode">
    <nav id="navbar">
        <a href="#home">~/home</a>
        <a href="#projects">~/projects</a>
        <a href="#experience">~/experience</a>
        <a href="#education">~/education</a>
        <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </nav>

    <main>
        <!-- intro -->
        <section id="home" class="scroll-section hidden">
            <div class="terminal-window">
                <div class="command-line"><span class="prompt">guest@portfolio:~$</span> whoami</div>
                <div class="output">
                    <!-- js fills this in -->
                    <h1 id="name" class="glitch-text"></h1>
                    <p id="role" class="role"></p>
                    <p id="intro" class="blinking-cursor"></p>
                    <div id="social-links" class="social-links"></div>
                </div>
            </div>
        </section>

        <!-- projects -->
        <section id="projects" class="scroll-section hidden">
            <div class="terminal-window">
                <div class="command-line"><span class="prompt">guest@portfolio:~$</span> ls -l ./projects</div>
                <!-- js fills this in -->
                <div id="projects-container" class="output"></div>
            </div>
        </section>

        <!-- work history -->
        <section id="experience" class="scroll-section hidden">
            <div class="terminal-window">
                <div class="command-line"><span class="prompt">guest@portfolio:~$</span> cat experience.txt</div>
                <!-- js fills this in -->
                <div id="experience-container" class="output"></div>
            </div>
        </section>

        <!-- school stuff -->
        <section id="education" class="scroll-section hidden">
            <div class="terminal-window">
                <div class="command-line"><span class="prompt">guest@portfolio:~$</span> ./show_education.sh</div>
                <!-- js fills this in -->
                <div id="education-container" class="output"></div>
            </div>
        </section>
    </main>

    <!-- main app logic -->
    <script src="script.js"></script>
</body>
</html>
